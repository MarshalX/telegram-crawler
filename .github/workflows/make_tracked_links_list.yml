name: Generate or update list of tracked links

on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *'
  push:
    # trigger on updated link crawler rules
    branches:
      - main

# one running + one queued run; overlapping runs only race each other to push the same files
concurrency:
  group: make-tracked-links
  cancel-in-progress: false

jobs:
  make_tracked_links_file:
    name: Make tracked links file
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:

      - name: Clone.
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Setup Python.
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
          cache: pip

      - name: Install dependencies.
        run: |
          pip install -r requirements.txt

      - name: Generate/update file with links.
        env:
          OUTPUT_FILENAME: "tracked_links_ci.txt"
          OUTPUT_RESOURCES_FILENAME: "tracked_res_links_ci.txt"
          OUTPUT_TRANSLATIONS_FILENAME: "tracked_tr_links_ci.txt"
        run: |
          python make_tracked_links_list.py

      - name: Commit and push changes.
        run: |
          mv tracked_links_ci.txt tracked_links.txt
          mv tracked_res_links_ci.txt tracked_res_links.txt
          mv tracked_tr_links_ci.txt tracked_tr_links.txt

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tracked_links.txt tracked_res_links.txt tracked_tr_links.txt
          git commit -m "Update tracked links" || exit 0

          # another push to main may land while we crawl; rebase and retry instead of dying
          for i in 1 2 3 4 5; do
            git push && exit 0
            git pull --rebase
          done
          exit 1
