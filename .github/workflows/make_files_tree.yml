name: Fetch new content of tracked links and files

on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *'
  push:
    # trigger on updated linkbase
    branches:
      - main

# one running + one queued run; overlapping runs crawl the same content and race to push
concurrency:
  group: make-files-tree
  cancel-in-progress: false

jobs:
  fetch_new_content:
    name: Make files tree
    runs-on: ${{matrix.os}}
    continue-on-error: true
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: web
            os: macos-14

          - mode: web_res
            os: ubuntu-22.04

          - mode: web_tr
            os: ubuntu-22.04

          - mode: server
            os: ubuntu-22.04

          - mode: client
            os: macos-14

          - mode: mini_app
            os: ubuntu-22.04

    steps:

      - name: Clone.
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Setup Python.
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
          cache: pip

      - name: Install dependencies.
        run: |
          pip install -r requirements.txt

      - name: Generate files tree.
        env:
          OUTPUT_FOLDER: "data_ci/"
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_SESSION_TEST: ${{ secrets.TELEGRAM_SESSION_TEST }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          MODE: ${{ matrix.mode }}
        run: |
          git pull
          python make_files_tree.py
          rm -rf __pycache__

      - name: Prepare data.
        run: |
          # every mode owns exactly one folder in data/ named after the mode
          rm -rf data/${{ matrix.mode }}
          mv data_ci/${{ matrix.mode }} data/${{ matrix.mode }}

      - name: Commit and push changes.
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/${{ matrix.mode }}
          git commit -m "Update content of files" || exit 0

          # matrix jobs race to push; rebase is always clean cuz every mode commits only its own folder
          for i in 1 2 3 4 5; do
            git push && exit 0
            git pull --rebase
          done
          exit 1
