    <script id="aj_script">Aj.onLoad(function(state) {
  state.unAuth = true;
  Telegram.Login.init({"client_id":8591891104,"scope":[]}, function (user) {
    if (user && user.id_token) {
      $.ajax({
        type: 'POST',
        url: '/auth/login',
        data: {
          id_token: user.id_token
        },
        success: function(result) {
          if (result) {
            location.reload();
          }
        },
        error: function(xhr) {
          showAlert(xhr.responseText || 'Server error');
        },
        dataType: 'json'
      });
    }
  });
  state.onAuthClick = function(e) {
    e.stopImmediatePropagation();
    e.preventDefault();
    Telegram.Login.open();
  };
  $('.login-link').on('click', state.onAuthClick);
  $(document).on('click', '.login-link', state.onAuthClick);
});
Aj.onUnload(function(state) {
  $('.login-link').off('click', state.onAuthClick);
  $(document).off('click', '.login-link');
});
</script>
